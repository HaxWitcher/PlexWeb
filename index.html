<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plex-Media — Streaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#06070b;
    --ink:#f8f4ec;
    --ink-dim:#b5afa3;
    --crimson:#e8362e;
    --crimson-deep:#9a1818;
    --gold:#e8c47a;
    --line:rgba(248,244,236,.18);

    /* === POZADINSKA SLIKA === */
    --bg-image: url("https://i.postimg.cc/766Bh8TD/011.png");
    --bg-position: center center;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Manrope',system-ui,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* 16:9 stage */
  .stage{
    position:relative;
    aspect-ratio: 16 / 9;
    width:min(100vw, calc(100vh * 16/9));
    height:min(100vh, calc(100vw * 9/16));
    background: var(--bg-0);
    overflow:hidden;
    container-type: inline-size;
    isolation:isolate;
  }

  /* === SLOJ 1: SLIKA === */
  .bg-image{
    position:absolute; inset:0;
    background-image: var(--bg-image);
    background-size: cover;
    background-position: var(--bg-position);
    background-repeat: no-repeat;
    z-index:0;
    filter: saturate(1.08) contrast(1.04);
  }

  /* === SLOJ 2: lijevi gradient === */
  .overlay-left{
    position:absolute; inset:0;
    z-index:1;
    background: linear-gradient(90deg,
      rgba(6,7,11,.88) 0%,
      rgba(6,7,11,.72) 28%,
      rgba(6,7,11,.30) 58%,
      rgba(6,7,11,.0) 78%
    );
    pointer-events:none;
  }

  /* === SLOJ 3: cinematic glow === */
  .overlay-glow{
    position:absolute; inset:0;
    z-index:2;
    background:
      radial-gradient(ellipse 45% 60% at 95% 100%, rgba(232,54,46,.18), transparent 55%),
      radial-gradient(ellipse 50% 40% at 30% 0%, rgba(232,196,122,.08), transparent 65%);
    pointer-events:none;
    mix-blend-mode: screen;
  }

  /* === SLOJ 4: top + bottom === */
  .overlay-edges{
    position:absolute; inset:0;
    z-index:3;
    background:
      linear-gradient(180deg, rgba(6,7,11,.75) 0%, rgba(6,7,11,0) 12%),
      linear-gradient(0deg, rgba(6,7,11,.95) 0%, rgba(6,7,11,.6) 14%, rgba(6,7,11,0) 30%);
    pointer-events:none;
  }

  /* === SLOJ 5: zrnatost === */
  .grain{
    position:absolute;inset:0;
    z-index:4;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.55'/></svg>");
    opacity:.06;
    mix-blend-mode:overlay;
    pointer-events:none;
  }

  /* === SLOJ 6: vinjeta === */
  .vignette{
    position:absolute;inset:0;
    z-index:5;
    background: radial-gradient(ellipse 120% 100% at 50% 50%, transparent 60%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }

  /* === Filmske ivice === */
  .reel{
    position:absolute; top:0; bottom:0; width:1.8cqw;
    background: repeating-linear-gradient(
      to bottom,
      #000 0, #000 1.0cqw,
      #0a0b0f 1.0cqw, #0a0b0f 2.0cqw
    );
    z-index:6;
    box-shadow: 0 0 2cqw rgba(0,0,0,.85);
  }
  .reel.left{ left:0; }
  .reel.right{ right:0; }

  .reel-dots{
    position:absolute; top:0;left:50%;transform:translateX(-50%);
    width:.95cqw; height:100%;
    display:flex; flex-direction:column;
    justify-content:space-around; align-items:center;
  }
  .reel-dots span{
    width:.95cqw;height:.95cqw;
    background:#000;border-radius:50%;
    box-shadow: inset 0 0 0 .12cqw #1c1c1c;
  }

  /* === GLAVNI SADRŽAJ === */
  .content{
    position:absolute;
    inset: 0 4cqw;
    z-index:7;
    display:grid;
    grid-template-rows: auto 1fr auto;
    padding: 2.4cqw 0 2.2cqw;
  }

  /* ============ TOP BAR ============ */
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .logo-wrap{
    display:flex;
    align-items:center;
  }
  .logo-img{
    height: 9.5cqw;
    width: auto;
    display:block;
    filter:
      drop-shadow(0 .25cqw 1.2cqw rgba(0,0,0,.95))
      drop-shadow(0 .1cqw .4cqw rgba(0,0,0,.9));
  }

  .badge{
    display:flex;
    align-items:center;
    gap:.7cqw;
    padding: .55cqw 1.1cqw;
    border:1px solid var(--line);
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size:.85cqw;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink);
  }
  .badge .dot{
    width:.55cqw;height:.55cqw;border-radius:50%;
    background:var(--crimson);
    box-shadow: 0 0 0 .2cqw rgba(232,54,46,.25), 0 0 .8cqw var(--crimson);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);opacity:1}
    50%{transform:scale(1.2);opacity:.7}
  }

  /* ============ MAIN ============ */
  .main{
    display:flex;
    align-items:center;
    padding: 2cqw 0;
  }

  .hook{
    display:flex;
    flex-direction:column;
    gap:1cqw;
    max-width: 62cqw;
  }

  .headline{
    font-family:'Anton', sans-serif;
    font-size: 6.6cqw;
    line-height: .92;
    color: #fff;
    text-transform:uppercase;
    letter-spacing:.005em;
    text-shadow:
      0 .3cqw 1.8cqw rgba(0,0,0,.95),
      0 .1cqw .6cqw rgba(0,0,0,.9);
  }
  .headline .accent-bar{
    display:block;
    width: 4cqw;
    height: .35cqw;
    background: var(--crimson);
    margin-bottom: 1.2cqw;
    box-shadow: 0 0 1.5cqw var(--crimson);
  }
  .headline em{
    display:block;
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 2.4cqw;
    color: var(--gold);
    text-transform:none;
    letter-spacing:0;
    margin-top: 1cqw;
    line-height:1.1;
  }

  /* ----- STATS ----- */
  .stats-bar{
    display:flex;
    align-items:flex-end;
    gap: 2.5cqw;
    margin-top: 1.8cqw;
    padding-top: 1.4cqw;
    border-top: 1px solid var(--line);
  }
  .stat{
    display:flex;
    flex-direction:column;
    gap:.1cqw;
  }
  .stat .num{
    font-family:'Anton', sans-serif;
    font-size: 3.4cqw;
    line-height:.9;
    color: #fff;
    text-shadow: 0 .25cqw 1cqw rgba(0,0,0,.9);
  }
  .stat .num .plus{ color: var(--crimson); }
  .stat .lbl{
    font-size: .82cqw;
    letter-spacing: .32em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-top: .35cqw;
    text-shadow: 0 .1cqw .5cqw rgba(0,0,0,.95);
  }
  .stat-divider{
    width: 1px;
    align-self:stretch;
    background: var(--line);
  }

  /* Stat sa kvalitet slikom */
  .stat-quality{
    align-self:center;
  }
  .quality-img{
    height: 3.2cqw;
    width: auto;
    display:block;
    filter:
      drop-shadow(0 .25cqw 1cqw rgba(0,0,0,.9))
      drop-shadow(0 .1cqw .3cqw rgba(0,0,0,.85));
  }

  /* ----- DISCLAIMER ispod stats-a ----- */
  .stats-disclaimer{
    margin-top: 1.1cqw;
    font-size: .82cqw;
    color: var(--ink-dim);
    letter-spacing:.06em;
    text-shadow: 0 .15cqw .5cqw rgba(0,0,0,.95);
  }
  .stats-disclaimer .x{
    color: var(--crimson);
    font-weight:700;
    margin-right:.4cqw;
  }

  /* ============ BOTTOM ============ */
  .bottom{
    display:grid;
    grid-template-columns: auto 1fr auto;
    align-items:center;
    gap: 2.5cqw;
    padding-top: 1.5cqw;
    border-top: 1px solid var(--line);
  }

  .promo{
    display:flex;
    flex-direction:column;
    gap:.4cqw;
  }
  .promo .ribbon{
    display:inline-flex;
    align-items:center;
    gap:.55cqw;
    align-self:flex-start;
    padding:.45cqw .85cqw;
    background: var(--crimson);
    color:#fff;
    font-size:.78cqw;
    letter-spacing:.32em;
    text-transform:uppercase;
    font-weight:800;
    box-shadow: 0 .3cqw 1.2cqw rgba(232,54,46,.45);
  }
  .promo .ribbon::before{
    content:""; width:.45cqw;height:.45cqw;background:#fff;border-radius:50%;
  }
  .promo .price-row{ display:flex; align-items:baseline; gap:.5cqw; }
  .promo .price{
    font-family:'Anton', sans-serif;
    font-size: 6.8cqw;
    line-height:.85;
    color:#fff;
    text-shadow: 0 .35cqw 1.8cqw rgba(0,0,0,1);
  }
  .promo .price .currency{
    font-size: 3cqw;
    color: var(--crimson);
    vertical-align:top;
    margin-right:.15cqw;
  }
  .promo .period{
    font-size: .9cqw;
    color: var(--ink);
    letter-spacing:.28em;
    text-transform:uppercase;
    padding-bottom: .9cqw;
    text-shadow: 0 .15cqw .6cqw rgba(0,0,0,.95);
  }

  .standard{
    align-self:end;
    padding-bottom:1.2cqw;
    padding-left:2cqw;
    border-left:1px solid var(--line);
  }
  .standard .lbl{
    font-size: .72cqw;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom: .35cqw;
    text-shadow: 0 .15cqw .6cqw rgba(0,0,0,.95);
  }
  .standard .val{
    font-family:'Manrope', sans-serif;
    font-size: 1.05cqw;
    font-weight:500;
    color: var(--ink);
    text-shadow: 0 .15cqw .6cqw rgba(0,0,0,.95);
  }
  .standard .val .price-num{
    color: var(--gold);
    font-family:'Anton', sans-serif;
    font-size: 1.8cqw;
    margin: 0 .15cqw;
    letter-spacing:.02em;
  }

  /* ===== CTA DUGME ===== */
  .cta-btn{
    align-self:center;
    display:inline-flex;
    align-items:center;
    gap:1cqw;
    padding: 1.4cqw 2.2cqw;
    background: var(--crimson);
    color:#fff;
    font-family:'Anton', sans-serif;
    font-size: 1.8cqw;
    letter-spacing:.08em;
    text-transform:uppercase;
    border:none;
    cursor:pointer;
    box-shadow:
      0 .8cqw 2.5cqw rgba(232,54,46,.5),
      inset 0 .15cqw 0 rgba(255,255,255,.2),
      inset 0 -.15cqw 0 rgba(0,0,0,.3);
    position:relative;
    text-decoration:none;
  }
  .cta-btn::before{
    content:"";
    position:absolute;
    top: -.5cqw; left: -.5cqw;
    right: -.5cqw; bottom: -.5cqw;
    border: 1px solid rgba(232,54,46,.35);
    pointer-events:none;
  }
  .cta-btn .arrow{
    font-size: 2cqw;
    line-height: .8;
    transform: translateY(-.05cqw);
  }
  .cta-sub{
    margin-top: .5cqw;
    font-size: .72cqw;
    color: var(--ink-dim);
    letter-spacing:.28em;
    text-transform:uppercase;
    text-align:right;
    text-shadow: 0 .15cqw .6cqw rgba(0,0,0,.95);
  }
  .cta-wrap{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
  }

</style>
</head>
<body>

<div class="stage">

  <!-- POZADINA -->
  <div class="bg-image"></div>
  <div class="overlay-left"></div>
  <div class="overlay-glow"></div>
  <div class="overlay-edges"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <!-- Filmske ivice -->
  <div class="reel left">
    <div class="reel-dots">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span>
    </div>
  </div>
  <div class="reel right">
    <div class="reel-dots">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span>
    </div>
  </div>

  <!-- SADRŽAJ -->
  <div class="content">

    <!-- TOP -->
    <header class="top">
      <div class="logo-wrap">
        <img src="https://i.postimg.cc/K86Ysytz/logo.png" alt="Plex-Media" class="logo-img">
      </div>
      <div class="badge">
        <span class="dot"></span>
        STREAMING SERVIS
      </div>
    </header>

    <!-- MAIN -->
    <section class="main">

      <div class="hook">
        <h1 class="headline">
          <span class="accent-bar"></span>
          Gledaj svaki<br>
          strani film<br>
          i seriju.
          <em>— sa prevodom.</em>
        </h1>

        <div class="stats-bar">
          <div class="stat">
            <div class="num">200.000<span class="plus">+</span></div>
            <div class="lbl">Filmova</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <div class="num">100.000<span class="plus">+</span></div>
            <div class="lbl">Serija</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat stat-quality">
            <img src="https://i.postimg.cc/zf79HCz9/4k.png" alt="4K i Full HD" class="quality-img">
          </div>
        </div>

        <div class="stats-disclaimer">
          <span class="x">✕</span>TV kanali nisu uključeni u ponudu.
        </div>
      </div>

    </section>

    <!-- BOTTOM -->
    <footer class="bottom">

      <div class="promo">
        <div class="ribbon">Promocija — Prvi mjesec</div>
        <div class="price-row">
          <div class="price"><span class="currency">€</span>10</div>
          <div class="period">/ 30 dana</div>
        </div>
      </div>

      <div class="standard">
        <div class="lbl">Nakon promocije</div>
        <div class="val">Standardna cijena <span class="price-num">15€</span> mjesečno</div>
      </div>

      <div class="cta-wrap">
        <a href="#" class="cta-btn">
          Aktiviraj sada
          <span class="arrow">→</span>
        </a>
        <div class="cta-sub">Otkazivanje u svakom trenutku</div>
      </div>

    </footer>

  </div>

</div>

</body>
</html>
